<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日蛋白質目標計算器｜ACE 代謝重建教練</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.12);
    --text: #f0f0f0;
    --text-muted: #666;
    --red: #ff4444;
    --blue: #4488ff;
    --orange: #ff8c00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header .label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 2px;
    line-height: 1.1;
    color: var(--text);
  }

  .header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.6;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .field input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 16px;
    font-family: 'Noto Sans TC', sans-serif;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .field input[type="number"]:focus {
    border-color: var(--accent);
  }

  .radio-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .radio-group.three {
    grid-template-columns: 1fr 1fr 1fr;
  }

  .radio-btn {
    position: relative;
  }

  .radio-btn input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }

  .radio-btn label {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    line-height: 1.3;
  }

  .radio-btn input:checked + label {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .calc-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }

  .calc-btn:active {
    transform: scale(0.98);
    opacity: 0.9;
  }

  /* Results */
  #result {
    display: none;
  }

  .result-hero {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 24px 20px;
    margin-bottom: 16px;
    text-align: center;
  }

  .result-hero .label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .result-hero .big-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    color: var(--accent);
    line-height: 1;
  }

  .result-hero .unit {
    font-size: 20px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .result-hero .per-kg {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 8px;
  }

  .meals-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .meal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }

  .meal-card .meal-name {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .meal-card .meal-g {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--text);
    line-height: 1;
  }

  .meal-card .meal-g span {
    font-size: 14px;
    color: var(--text-muted);
  }

  .meal-card .meal-example {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
    line-height: 1.4;
  }

  .insight-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }

  .insight-card .insight-title {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .insight-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
  }

  .insight-item:last-child { margin-bottom: 0; }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-top: 7px;
  }

  /* CTA */
  .cta-card {
    background: linear-gradient(135deg, #1a1f0d 0%, #161616 100%);
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 24px 20px;
    text-align: center;
    margin-top: 8px;
  }

  .cta-card .cta-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .cta-card h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 1px;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .cta-card p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .cta-btn {
    display: block;
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #000;
    text-decoration: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    margin-bottom: 10px;
    transition: opacity 0.2s;
  }

  .cta-btn:active { opacity: 0.85; }

  .cta-secondary {
    font-size: 12px;
    color: var(--text-muted);
  }

  .cta-secondary a {
    color: var(--accent);
    text-decoration: none;
  }

  .reset-btn {
    display: block;
    width: 100%;
    padding: 15px;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid #444;
    border-radius: 10px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 12px;
    transition: border-color 0.2s, background 0.2s;
    letter-spacing: 1px;
  }

  .reset-btn:active {
    background: #2a2a2a;
  }

  .error-msg {
    color: var(--red);
    font-size: 12px;
    margin-top: 6px;
    display: none;
  }

  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button {
    -webkit-appearance: none;
  }
</style>
</head>
<body>

<div class="header">
  <div class="label">ACE 代謝重建教練</div>
  <h1>每日蛋白質<br>目標計算器</h1>
  <p>輸入你的資料，算出每天需要吃多少蛋白質<br>以及每餐該怎麼分配</p>
</div>

<!-- Form -->
<div id="form-section">

  <div class="card">
    <div class="card-title">基本資料</div>

    <div class="field">
      <label>體重（kg）</label>
      <input type="number" id="weight" placeholder="例：70" min="30" max="200">
      <div class="error-msg" id="weight-err">請輸入 30–200 之間的體重</div>
    </div>

    <div class="field">
      <label>年齡</label>
      <input type="number" id="age" placeholder="例：28" min="15" max="80">
    </div>

    <div class="field">
      <label>性別</label>
      <div class="radio-group">
        <div class="radio-btn">
          <input type="radio" name="gender" id="male" value="male" checked>
          <label for="male">男</label>
        </div>
        <div class="radio-btn">
          <input type="radio" name="gender" id="female" value="female">
          <label for="female">女</label>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">訓練狀況</div>

    <div class="field">
      <label>每週訓練天數</label>
      <div class="radio-group three">
        <div class="radio-btn">
          <input type="radio" name="training" id="t1" value="1" checked>
          <label for="t1">1–2天<br><span style="font-size:10px">輕度</span></label>
        </div>
        <div class="radio-btn">
          <input type="radio" name="training" id="t2" value="2">
          <label for="t2">3–4天<br><span style="font-size:10px">中度</span></label>
        </div>
        <div class="radio-btn">
          <input type="radio" name="training" id="t3" value="3">
          <label for="t3">5天以上<br><span style="font-size:10px">高強度</span></label>
        </div>
      </div>
    </div>

    <div class="field">
      <label>訓練目標</label>
      <div class="radio-group">
        <div class="radio-btn">
          <input type="radio" name="goal" id="g1" value="cut" checked>
          <label for="g1">減脂</label>
        </div>
        <div class="radio-btn">
          <input type="radio" name="goal" id="g2" value="bulk">
          <label for="g2">增肌</label>
        </div>
        <div class="radio-btn">
          <input type="radio" name="goal" id="g3" value="recomp">
          <label for="g3">體態重組</label>
        </div>
        <div class="radio-btn">
          <input type="radio" name="goal" id="g4" value="maintain">
          <label for="g4">維持體態</label>
        </div>
      </div>
    </div>

    <div class="field">
      <label>每天幾餐？</label>
      <div class="radio-group three">
        <div class="radio-btn">
          <input type="radio" name="meals" id="m2" value="2" checked>
          <label for="m2">2 餐</label>
        </div>
        <div class="radio-btn">
          <input type="radio" name="meals" id="m3" value="3">
          <label for="m3">3 餐</label>
        </div>
        <div class="radio-btn">
          <input type="radio" name="meals" id="m4" value="4">
          <label for="m4">4 餐</label>
        </div>
      </div>
    </div>
  </div>

  <button class="calc-btn" onclick="calculate()">計算我的蛋白質目標</button>
</div>

<!-- Results -->
<div id="result">

  <div class="result-hero">
    <div class="label">你的每日蛋白質目標</div>
    <div class="big-number" id="total-protein">—</div>
    <div class="unit">公克／天</div>
    <div class="per-kg" id="per-kg-text"></div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="card-title">每餐分配建議</div>
    <div class="meals-grid" id="meals-grid"></div>
  </div>

  <div class="insight-card">
    <div class="insight-title">為什麼你需要這麼多蛋白質</div>
    <div id="insights"></div>
  </div>

  <div class="cta-card">
    <div class="cta-label">光知道數字還不夠</div>
    <h3>蛋白質吃夠了<br>你的體態才會有反應</h3>
    <p>很多人知道目標數字，但不知道怎麼實際落地執行。<br>8週陪跑計畫幫你把飲食、訓練、作息整合成一套系統。</p>
    <a href="https://lin.ee/XOFyyQv" class="cta-btn" target="_blank">免費諮詢 ACE 教練</a>
  </div>

  <button class="reset-btn" onclick="reset()">↩ 重新計算</button>
</div>

<script>
const mealExamples = {
  cut: [
    ['雞胸肉 150g', '水煮蛋 2顆', '豆腐 1塊', '鮪魚罐頭'],
    ['雞腿肉去皮', '希臘優格', '低脂起司', '毛豆'],
  ],
  bulk: [
    ['雞胸肉 200g', '牛肉 150g', '鮭魚 150g', '全蛋 3顆'],
    ['牛奶 500ml', '乳清蛋白', '雞蛋豆腐', '豬里肌'],
  ],
  recomp: [
    ['雞胸肉 150g', '鮭魚 150g', '蛋白 4顆', '豆漿'],
    ['牛腱肉', '希臘優格', '毛豆', '鮪魚罐頭'],
  ],
  maintain: [
    ['雞腿肉', '豬里肌', '豆腐', '水煮蛋'],
    ['鮭魚', '希臘優格', '毛豆', '起司'],
  ],
};

const goalLabels = {
  cut: '減脂',
  bulk: '增肌',
  recomp: '體態重組',
  maintain: '維持體態',
};

function getMultiplier(goal, training) {
  const base = {
    cut:      [1.6, 1.8, 2.0],
    bulk:     [1.7, 1.9, 2.2],
    recomp:   [1.8, 2.0, 2.2],
    maintain: [1.4, 1.6, 1.8],
  };
  return base[goal][training - 1];
}

function getInsights(goal, weight, totalProtein, gender) {
  const perKg = (totalProtein / weight).toFixed(1);
  const items = [];

  if (goal === 'cut') {
    items.push(`減脂期蛋白質要吃足，才能在熱量赤字下保住肌肉，避免代謝下降。`);
    items.push(`你每公斤需要攝取 ${perKg}g 蛋白質，這是讓身體優先燃脂而非燃肌的關鍵。`);
  } else if (goal === 'bulk') {
    items.push(`增肌期蛋白質是肌肉合成的原料，吃不夠就算訓練再努力也難有反應。`);
    items.push(`每公斤 ${perKg}g 配合足夠的訓練刺激，才能有效推動肌肉生長。`);
  } else if (goal === 'recomp') {
    items.push(`體態重組對蛋白質需求最高，因為你要同時進行脂肪分解和肌肉合成。`);
    items.push(`維持每公斤 ${perKg}g 是讓重組效率最大化的基礎條件。`);
  } else {
    items.push(`維持期仍需要足夠蛋白質來支撐日常訓練的恢復和肌肉維持。`);
  }

  items.push(`蛋白質分散在每餐攝取，比一次性吃完吸收效率高出許多。`);

  return items;
}

function calculate() {
  const weight = parseFloat(document.getElementById('weight').value);
  const age = parseFloat(document.getElementById('age').value);

  // validation
  const weightErr = document.getElementById('weight-err');
  if (!weight || weight < 30 || weight > 200) {
    weightErr.style.display = 'block';
    return;
  }
  weightErr.style.display = 'none';

  if (!age) {
    alert('請輸入年齡');
    return;
  }

  const gender = document.querySelector('input[name="gender"]:checked').value;
  const training = parseInt(document.querySelector('input[name="training"]:checked').value);
  const goal = document.querySelector('input[name="goal"]:checked').value;
  const meals = parseInt(document.querySelector('input[name="meals"]:checked').value);

  const multiplier = getMultiplier(goal, training);
  const totalProtein = Math.round(weight * multiplier);
  const perMeal = Math.round(totalProtein / meals);

  // Update hero
  document.getElementById('total-protein').textContent = totalProtein;
  document.getElementById('per-kg-text').textContent = `約每公斤體重 ${multiplier}g｜目標：${goalLabels[goal]}`;

  // Meals grid
  const mealNames = ['第一餐', '第二餐', '第三餐', '第四餐'];
  const examples = mealExamples[goal];
  let mealsHTML = '';
  for (let i = 0; i < meals; i++) {
    const ex = examples[i % examples.length];
    const exText = ex[i % ex.length];
    mealsHTML += `
      <div class="meal-card">
        <div class="meal-name">${mealNames[i]}</div>
        <div class="meal-g">${perMeal}<span>g</span></div>
        <div class="meal-example">參考食材：${exText}</div>
      </div>`;
  }
  document.getElementById('meals-grid').innerHTML = mealsHTML;

  // Insights
  const insightItems = getInsights(goal, weight, totalProtein, gender);
  document.getElementById('insights').innerHTML = insightItems
    .map(text => `<div class="insight-item"><div class="dot"></div><div>${text}</div></div>`)
    .join('');

  // Show result
  document.getElementById('form-section').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function reset() {
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
