<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACE 健身教練</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A0A;
    color: #F5F0E8;
    font-family: Georgia, serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(201,168,76,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    width: 100%;
    max-width: 440px;
    padding: 52px 24px 80px;
    position: relative;
    z-index: 1;
    opacity: 0;
    transform: translateY(16px);
    transition: all 0.7s ease;
  }
  .container.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* HEADER */
  .header { text-align: center; margin-bottom: 44px; }
  .avatar-wrap { position: relative; display: inline-block; margin-bottom: 20px; }
  .avatar-ring {
    width: 122px; height: 122px; border-radius: 50%;
    background: conic-gradient(#C9A84C 0deg, #E8C96A 90deg, #7A6030 180deg, #C9A84C 270deg, #E8C96A 360deg);
    display: flex; align-items: center; justify-content: center;
    animation: spin 8s linear infinite;
  }
  .avatar-ring img {
    width: 110px; height: 110px; border-radius: 50%;
    object-fit: cover; object-position: top center;
    border: 2px solid #0A0A0A;
  }
  .name {
    font-size: 28px; font-weight: 900; letter-spacing: 4px;
    background: linear-gradient(90deg, #F5F0E8 0%, #E8C96A 50%, #F5F0E8 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    animation: shimmer 4s linear infinite;
  }
  .tag {
    display: inline-block;
    font-size: 11px; letter-spacing: 3px; color: #C9A84C;
    border: 1px solid rgba(201,168,76,0.35); border-radius: 2px;
    padding: 3px 12px; margin-bottom: 14px;
    font-family: sans-serif; font-weight: 600;
  }
  .tagline {
    font-size: 13px; color: #9A9080;
    letter-spacing: 0.4px; line-height: 1.9;
    padding: 0 8px;
  }

  /* DIVIDER */
  .divider {
    display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
  }
  .divider-line {
    flex: 1; height: 1px;
  }
  .divider-line.left { background: linear-gradient(to right, transparent, #3A3020); }
  .divider-line.right { background: linear-gradient(to left, transparent, #3A3020); }
  .divider-label {
    font-size: 10px; letter-spacing: 4px; color: #5A5040;
    font-family: sans-serif; white-space: nowrap;
  }

  /* LINK CARDS */
  .links { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
  .link-card {
    display: flex; align-items: center; gap: 14px;
    padding: 17px 18px;
    background: #161616;
    border: 1px solid #222; border-radius: 4px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative; overflow: hidden;
    text-decoration: none; color: inherit;
  }
  .link-card:hover {
    background: #1E1E1E;
    border-color: #7A6030;
    transform: translateX(5px);
  }
  .link-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(to bottom, #E8C96A, #7A6030);
    transform: scaleY(0);
    transition: transform 0.25s ease;
  }
  .link-card:hover::before { transform: scaleY(1); }
  .link-icon {
    width: 40px; height: 40px; border-radius: 3px;
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    transition: all 0.25s ease;
  }
  .link-card:hover .link-icon {
    background: rgba(201,168,76,0.12);
    border-color: #C9A84C;
  }
  .link-text { flex: 1; }
  .link-title {
    font-size: 14px; font-weight: 700; color: #F5F0E8;
    margin-bottom: 2px; letter-spacing: 0.3px;
  }
  .link-desc { font-size: 11px; color: #9A9080; }
  .link-arrow {
    color: #5A5040; font-size: 18px;
    transition: all 0.25s ease;
  }
  .link-card:hover .link-arrow { color: #C9A84C; transform: translateX(3px); }

  /* SOCIAL */
  .social { display: flex; justify-content: center; gap: 14px; margin-top: 18px; }
  .social-btn {
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid #222; background: #161616;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #9A9080;
    transition: all 0.25s ease; text-decoration: none;
  }
  .social-btn:hover {
    border-color: #C9A84C; color: #C9A84C;
    background: rgba(201,168,76,0.08);
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(201,168,76,0.1);
  }

  /* FOOTER */
  .footer { text-align: center; margin-top: 52px; }
  .footer-text { font-size: 10px; letter-spacing: 4px; color: #5A5040; font-family: sans-serif; }
  .footer-line { width: 36px; height: 1px; background: #5A5040; margin: 10px auto 0; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shimmer { to { background-position: 200% center; } }
</style>
</head>
