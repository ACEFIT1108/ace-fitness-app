<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>理想體脂率 | ACE 教練實用工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #b388ff;
    --accent2: #ea80fc;
    --accent-grad: linear-gradient(135deg, #b388ff, #ea80fc);
    --accent-dim: rgba(179,136,255,0.15);
    --bg: #0e0d14;
    --surface: #16151f;
    --surface2: #1e1c2a;
    --surface3: #252338;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --text-sub: #aaa;
    --text-muted: #555;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 60px;
  }
  .wrap { width:100%; max-width:480px; padding:0 20px; }

  header {
    width:100%; text-align:center;
    padding:36px 20px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .brand-tag {
    font-size:11px; letter-spacing:0.18em; color:var(--accent);
    font-weight:700; text-transform:uppercase; margin-bottom:12px;
  }
  header h1 {
    font-size:42px; font-weight:900; letter-spacing:-0.02em; line-height:1; margin-bottom:10px;
    background: var(--accent-grad);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  header p { font-size:13px; color:var(--text-sub); font-weight:300; }

  .card {
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:24px 20px;
    margin-bottom:16px;
  }
  .section-title {
    font-size:11px; font-weight:700; letter-spacing:0.14em;
    text-transform:uppercase; color:var(--text-muted); margin-bottom:20px;
  }

  .gender-group { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:28px; }
  .gender-btn {
    padding:12px; background:var(--surface2); border:1.5px solid var(--border);
    border-radius:10px; color:var(--text-sub); font-size:15px; font-weight:700;
    font-family:'Noto Sans TC',sans-serif; cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .gender-btn.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }

  /* SLIDER FIELD */
  .slider-field { margin-bottom:24px; }

  .slider-top {
    display:flex; align-items:center;
    justify-content:space-between; margin-bottom:10px; gap:12px;
  }
  .slider-name { font-size:13px; color:var(--text-sub); font-weight:500; flex-shrink:0; }

  /* Input + unit inline */
  .input-unit-wrap {
    display:flex; align-items:center; gap:4px;
  }

  .num-input {
    background: var(--surface3);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--accent);
    font-size: 22px;
    font-weight: 900;
    font-family: 'Noto Sans TC', sans-serif;
    text-align: right;
    width: 78px;
    padding: 4px 8px;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  .num-input::-webkit-outer-spin-button,
  .num-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .num-input:focus { border-color: var(--accent); }

  .slider-unit { font-size:13px; color:var(--text-sub); font-weight:500; flex-shrink:0; }

  /* Age row stays old style (integer only, small display) */
  .slider-val-wrap { display:flex; align-items:baseline; gap:4px; }
  .slider-val { font-size:28px; font-weight:900; color:var(--accent); min-width:52px; text-align:right; line-height:1; }

  input[type="range"] {
    -webkit-appearance:none; width:100%; height:4px;
    border-radius:2px; background:var(--surface3); outline:none; cursor:pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance:none; width:22px; height:22px; border-radius:50%;
    background: var(--accent-grad);
    box-shadow:0 0 10px rgba(179,136,255,0.5); cursor:pointer; transition:box-shadow 0.2s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { box-shadow:0 0 18px rgba(179,136,255,0.7); }
  input[type="range"]::-moz-range-thumb {
    width:22px; height:22px; border-radius:50%; background:var(--accent); border:none; cursor:pointer;
  }

  .btn-main {
    width:100%; padding:18px;
    background: var(--accent-grad);
    border:none; border-radius:14px; color:#fff;
    font-size:17px; font-weight:900; font-family:'Noto Sans TC',sans-serif;
    letter-spacing:0.04em; cursor:pointer; transition:all 0.2s;
    box-shadow:0 4px 24px rgba(179,136,255,0.35);
  }
  .btn-main:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(179,136,255,0.5); }

  #result { display:none; animation:fadeUp 0.4s ease; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to { opacity:1; transform:translateY(0); }
  }

  .bf-display { text-align:center; padding:28px 20px 20px; }
  .bf-num {
    font-size:80px; font-weight:900; line-height:1; letter-spacing:-0.04em;
    background: var(--accent-grad);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .bf-pct { font-size:32px; font-weight:900; }
  .bf-label { font-size:13px; color:var(--text-sub); margin-top:4px; letter-spacing:0.08em; }

  .bar-wrap { padding:0 4px; margin-bottom:6px; }
  .bar-labels {
    display:flex; justify-content:space-between;
    font-size:10px; color:var(--text-muted); margin-bottom:6px; letter-spacing:0.04em;
  }
  .bar-track {
    height:8px; border-radius:4px;
    background:linear-gradient(90deg,#74b9ff 0%,#55efc4 20%,#ffd32a 50%,#ff9f43 75%,#ff5252 100%);
    position:relative; margin-bottom:4px;
  }
  .bar-marker {
    position:absolute; top:50%; transform:translate(-50%,-50%);
    width:16px; height:16px; background:#fff;
    border:3px solid var(--accent); border-radius:50%;
    box-shadow:0 0 10px rgba(179,136,255,0.6);
    transition:left 0.7s cubic-bezier(0.4,0,0.2,1);
  }

  .status-badge {
    display:inline-block; padding:6px 20px; border-radius:20px;
    font-size:14px; font-weight:700; letter-spacing:0.06em; margin:12px auto 0;
  }

  .stats-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
  .stat-box {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; padding:14px 16px; text-align:center;
  }
  .stat-val { font-size:28px; font-weight:900; color:var(--accent); line-height:1; margin-bottom:4px; }
  .stat-label { font-size:11px; color:var(--text-sub); }

  .advice-card {
    background:var(--accent-dim); border:1px solid rgba(179,136,255,0.25);
    border-radius:12px; padding:16px;
    font-size:13px; line-height:1.7; color:var(--text-sub); margin-top:16px;
  }
  .advice-card strong { color:var(--accent); display:block; margin-bottom:4px; font-size:14px; }

  .goal-title { font-size:13px; color:var(--text-sub); margin-bottom:12px; font-weight:500; }
  .goal-tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .goal-tab {
    padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700;
    cursor:pointer; border:1.5px solid var(--border); background:var(--surface2);
    color:var(--text-sub); font-family:'Noto Sans TC',sans-serif; transition:all 0.2s;
  }
  .goal-tab.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
  .divider { height:1px; background:var(--border); margin:8px 0 20px; }
  .goal-range-display { text-align:center; padding:20px; }
  .goal-range-num {
    font-size:44px; font-weight:900; letter-spacing:-0.03em;
    background: var(--accent-grad);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-bottom:4px;
  }
  .goal-range-desc { font-size:13px; color:var(--text-sub); line-height:1.6; }

  .ref-table-header {
    display:grid; grid-template-columns:1fr 1fr 1fr;
    gap:8px; margin-bottom:10px; padding:0 4px;
  }
  .ref-col-label { font-size:10px; color:var(--text-muted); font-weight:700; letter-spacing:0.1em; text-transform:uppercase; }
  .ref-row {
    display:grid; grid-template-columns:1fr 1fr 1fr;
    gap:8px; padding:10px 4px;
    border-bottom:1px solid var(--border); align-items:center;
  }
  .ref-row:last-child { border-bottom:none; }
  .ref-row.highlight {
    background:var(--accent-dim); border-radius:8px;
    border-color:transparent; padding:10px; margin:0 -4px;
  }
  .ref-category { font-weight:700; font-size:13px; }
  .ref-range { color:var(--text-sub); font-size:13px; }
  .ref-note { color:var(--text-muted); font-size:12px; }

  .line-cta {
    display:flex; align-items:center; justify-content:center; gap:10px;
    background:#00B900; border:none; border-radius:14px;
    padding:18px 24px; color:#fff; font-size:15px; font-weight:700;
    font-family:'Noto Sans TC',sans-serif; text-decoration:none;
    transition:all 0.2s; width:100%; letter-spacing:0.03em;
    box-shadow:0 4px 20px rgba(0,185,0,0.3); margin-bottom:16px;
  }
  .line-cta:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,185,0,0.4); }
  .cta-note { font-size:12px; color:var(--text-sub); text-align:center; line-height:1.8; margin-bottom:16px; }

  footer { text-align:center; margin-top:32px; font-size:11px; color:var(--text-muted); }
  footer span { color:var(--accent); }
</style>
</head>
<body>

<header>
  <div class="brand-tag">ACE 教練 · 實用工具</div>
  <h1>理想體脂率</h1>
  <p>輸入你的體脂率，看看你在哪個區間</p>
</header>

<div class="wrap">

  <div class="card">
    <div class="section-title">你的資料</div>

    <div class="gender-group">
      <button class="gender-btn active" id="btn-male" onclick="setGender('male')">♂ 男性</button>
      <button class="gender-btn" id="btn-female" onclick="setGender('female')">♀ 女性</button>
    </div>

    <!-- 體脂率：滑桿 + 數字輸入 -->
    <div class="slider-field">
      <div class="slider-top">
        <span class="slider-name">目前體脂率</span>
        <div class="input-unit-wrap">
          <input class="num-input" id="inp-bf" type="number" min="3" max="50" step="0.1" value="21.0"
            oninput="onNumInput('bf', this.value)">
          <span class="slider-unit">%</span>
        </div>
      </div>
      <input type="range" id="sl-bf" min="3" max="50" step="0.1" value="21"
        oninput="onSliderInput('bf', this.value)">
    </div>

    <!-- 體重：滑桿 + 數字輸入 -->
    <div class="slider-field">
      <div class="slider-top">
        <span class="slider-name">體重</span>
        <div class="input-unit-wrap">
          <input class="num-input" id="inp-wt" type="number" min="30" max="200" step="0.1" value="70.0"
            oninput="onNumInput('wt', this.value)">
          <span class="slider-unit">kg</span>
        </div>
      </div>
      <input type="range" id="sl-wt" min="30" max="200" step="0.5" value="70"
        oninput="onSliderInput('wt', this.value)">
    </div>

    <!-- 體齡：滑桿只顯示整數即可 -->
    <div class="slider-field">
      <div class="slider-top">
        <span class="slider-name">體齡</span>
        <div class="slider-val-wrap">
          <span class="slider-val" id="val-age">30</span>
          <span class="slider-unit">歲</span>
        </div>
      </div>
      <input type="range" id="sl-age" min="15" max="75" value="30"
        oninput="document.getElementById('val-age').textContent=this.value">
    </div>

    <button class="btn-main" onclick="calculate()">查看我的體脂狀況</button>
  </div>

  <!-- RESULT -->
  <div id="result">

    <div class="section-title" style="margin-bottom:8px">你的體脂狀況</div>

    <div class="card">
      <div class="bf-display">
        <div class="bf-num"><span id="r-bf">21</span><span class="bf-pct">%</span></div>
        <div class="bf-label">目前體脂率</div>
      </div>
      <div class="bar-wrap">
        <div class="bar-labels">
          <span>偏低</span><span>健康低</span><span>標準</span><span>偏高</span><span>過高</span>
        </div>
        <div class="bar-track">
          <div class="bar-marker" id="bar-marker" style="left:50%"></div>
        </div>
      </div>
      <div style="text-align:center">
        <span class="status-badge" id="status-badge">—</span>
      </div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-val" id="r-fat-mass">—</div>
          <div class="stat-label">高脂量 (kg)</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="r-lean-mass">—</div>
          <div class="stat-label">去脂體重 (kg)</div>
        </div>
      </div>
      <div class="advice-card">
        <strong id="r-advice-title">—</strong>
        <span id="r-advice-body">—</span>
      </div>
    </div>

    <div class="card">
      <div class="section-title">推薦你的目標體態</div>
      <div class="goal-title">選擇你的目標方向：</div>
      <div class="goal-tabs" id="goal-tabs"></div>
      <div class="divider"></div>
      <div class="goal-range-display">
        <div class="goal-range-num" id="g-range">—</div>
        <div class="goal-range-desc" id="g-desc">—</div>
      </div>
    </div>

    <div class="card">
      <p class="cta-note">知道目標在哪裡只是第一步。<br>怎麼達到才是重點<br>想讓 ACE 教練幫你規劃？</p>
      <a href="https://lin.ee/XOFyyQv" target="_blank" class="line-cta">
        <svg width="22" height="22" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="8" fill="white"/>
          <path d="M33.5 18.6C33.5 12.8 27.6 8 20.3 8S7 12.8 7 18.6c0 5.2 4.6 9.5 10.8 10.4.4.1 1 .3 1.1.7.1.4 0 .9 0 .9l-.2 1.2c-.1.4-.4 1.5 1.3.8 1.7-.7 9.2-5.4 12.6-9.3 2.2-2.5 3.9-5.1 3.9-4.7z" fill="#00B900"/>
          <path d="M27 21.5h-3.6v-6c0-.3-.3-.6-.6-.6h-.6c-.3 0-.6.3-.6.6v7.2c0 .3.3.6.6.6H27c.3 0 .6-.3.6-.6v-.6c0-.3-.3-.6-.6-.6zM16.4 14.9h-.6c-.3 0-.6.3-.6.6v7.2c0 .3.3.6.6.6h.6c.3 0 .6-.3.6-.6v-7.2c0-.3-.3-.6-.6-.6zM24 14.9h-.6c-.3 0-.6.3-.6.6v4.3l-3.3-4.6-.1-.1H18c-.3 0-.6.3-.6.6v7.2c0 .3.3.6.6.6h.6c.3 0 .6-.3.6-.6v-4.3l3.4 4.6.1.1H24c.3 0 .6-.3.6-.6v-7.2c0-.3-.3-.6-.6-.6z" fill="white"/>
        </svg>
        Line@ 回覆「我想諮詢」
      </a>
    </div>

    <div class="card">
      <div class="section-title">體脂率完整對照表</div>
      <div class="gender-group" style="margin-bottom:20px">
        <button class="gender-btn active" id="tbl-male" onclick="setTableGender('male')">♂ 男性</button>
        <button class="gender-btn" id="tbl-female" onclick="setTableGender('female')">♀ 女性</button>
      </div>
      <div id="ref-table"></div>
    </div>

  </div>

  <footer>&copy; 2025 <span>ACE</span> · 代謝重建教練 · @acefit1108</footer>
</div>

<script>
const BF_DATA = {
  male: [
    { key:'essential', label:'必需脂肪', range:'2–5%',   min:2,  max:5,  note:'維持生命所需', color:'#74b9ff' },
    { key:'athlete',   label:'運動員',   range:'6–13%',  min:6,  max:13, note:'高度訓練水準', color:'#55efc4' },
    { key:'fit',       label:'精實健康', range:'14–17%', min:14, max:17, note:'優良體態範圍', color:'#a8e063' },
    { key:'avg',       label:'一般健康', range:'18–24%', min:18, max:24, note:'建議正常範圍', color:'#ffd32a' },
    { key:'obese',     label:'過重',     range:'25–29%', min:25, max:29, note:'建議積極調整', color:'#ff9f43' },
    { key:'danger',    label:'肥胖',     range:'30%+',   min:30, max:99, note:'代謝風險偏高', color:'#ff5252' },
  ],
  female: [
    { key:'essential', label:'必需脂肪', range:'1–5%',   min:1,  max:5,  note:'維持生命所需', color:'#74b9ff' },
    { key:'athlete',   label:'運動員',   range:'6–13%',  min:6,  max:13, note:'高度訓練水準', color:'#55efc4' },
    { key:'fit',       label:'精實健康', range:'14–20%', min:14, max:20, note:'優良體態範圍', color:'#a8e063' },
    { key:'avg',       label:'一般健康', range:'21–31%', min:21, max:31, note:'建議正常範圍', color:'#ffd32a' },
    { key:'obese',     label:'過重',     range:'32–39%', min:32, max:39, note:'建議積極調整', color:'#ff9f43' },
    { key:'danger',    label:'肥胖',     range:'40%+',   min:40, max:99, note:'代謝風險偏高', color:'#ff5252' },
  ]
};

const GOALS = {
  male: [
    { key:'athlete', label:'🏅 運動員',   range:'6 – 13%',  desc:'適合競技運動員或高度訓練者，需要嚴格飲食與訓練計畫。' },
    { key:'fit',     label:'💪 精實健康', range:'14 – 17%', desc:'精實健康體態，身形勻稱有腹肌輪廓，是許多男性的理想目標。' },
    { key:'avg',     label:'✅ 一般健康', range:'18 – 24%', desc:'健康的一般體態，維持日常活力與代謝健康的合理目標。' },
  ],
  female: [
    { key:'athlete', label:'🏅 運動員',   range:'6 – 13%',  desc:'適合競技運動員，體脂極低，需要專業計畫支持。' },
    { key:'fit',     label:'💪 精實健康', range:'14 – 20%', desc:'精實健康體態，身形有曲線，是許多女性的理想體態區間。' },
    { key:'avg',     label:'✅ 一般健康', range:'21 – 31%', desc:'健康的一般體態，兼顧日常活力與荷爾蒙平衡的合理目標。' },
  ]
};

const ADVICE = {
  essential: { title:'體脂過低，需要注意！',    body:'目前體脂率低於維持正常生理功能的基本需求，建議諮詢專業評估，避免荷爾蒙與免疫系統受影響。' },
  athlete:   { title:'運動員等級，保持就是挑戰', body:'這是競技運動員的體脂區間，需要高度訓練與飲食精準控制才能維持，普通人若非目標無須強求。' },
  fit:       { title:'精實健康體態，繼續維持！', body:'你已在理想體脂範圍，身形勻稱有型，同時維持良好的代謝健康。持續訓練與均衡飲食即可。' },
  avg:       { title:'一般健康範圍，有進步空間', body:'目前體脂在健康範圍內，若想改善體態可透過適當阻力訓練與飲食調整，逐步提升體態品質。' },
  obese:     { title:'體脂偏高，建議開始介入',  body:'體脂已超出健康建議範圍，代謝效率可能下降。建議從飲食調整與規律訓練開始，循序漸進改善。' },
  danger:    { title:'體脂過高，代謝風險上升',  body:'目前體脂率顯著偏高，增加心血管與代謝相關風險。建議尋求專業教練或醫療協助，制定改善計畫。' },
};

let gender = 'male';
let tableGender = 'male';
let activeGoal = 'fit';

// 滑桿 → 同步數字欄
function onSliderInput(id, val) {
  const inp = document.getElementById('inp-' + id);
  if (inp) inp.value = parseFloat(val).toFixed(1);
}

// 數字欄 → 同步滑桿
function onNumInput(id, val) {
  const sl = document.getElementById('sl-' + id);
  const num = parseFloat(val);
  if (!isNaN(num)) {
    const min = parseFloat(sl.min), max = parseFloat(sl.max);
    sl.value = Math.min(max, Math.max(min, num));
  }
}

function setGender(g) {
  gender = g;
  document.getElementById('btn-male').classList.toggle('active', g==='male');
  document.getElementById('btn-female').classList.toggle('active', g==='female');
  const defaultBf = g==='female' ? 25.0 : 21.0;
  document.getElementById('sl-bf').value = defaultBf;
  document.getElementById('inp-bf').value = defaultBf.toFixed(1);
}

function setTableGender(g) {
  tableGender = g;
  document.getElementById('tbl-male').classList.toggle('active', g==='male');
  document.getElementById('tbl-female').classList.toggle('active', g==='female');
  renderRefTable(g);
}

function getCurrentBf() {
  const inpVal = parseFloat(document.getElementById('inp-bf').value);
  const slVal  = parseFloat(document.getElementById('sl-bf').value);
  // prefer typed input if valid
  if (!isNaN(inpVal) && inpVal >= 3 && inpVal <= 50) return inpVal;
  return slVal;
}

function getCurrentWt() {
  const inpVal = parseFloat(document.getElementById('inp-wt').value);
  const slVal  = parseFloat(document.getElementById('sl-wt').value);
  if (!isNaN(inpVal) && inpVal >= 30 && inpVal <= 200) return inpVal;
  return slVal;
}

function calculate() {
  const bf  = getCurrentBf();
  const wt  = getCurrentWt();

  const fatMass  = (bf/100*wt).toFixed(1);
  const leanMass = (wt - fatMass).toFixed(1);

  document.getElementById('r-bf').textContent = bf % 1 === 0 ? bf : bf.toFixed(1);
  document.getElementById('r-fat-mass').textContent = fatMass;
  document.getElementById('r-lean-mass').textContent = leanMass;

  const data = BF_DATA[gender];
  let current = data[data.length-1];
  for (const d of data) {
    if (bf >= d.min && bf <= d.max) { current = d; break; }
  }

  const badge = document.getElementById('status-badge');
  badge.textContent = current.label;
  badge.style.cssText = `background:${current.color}22; border:1.5px solid ${current.color}; color:${current.color}`;

  // bar: bf 3–50 → 0–100%
  const pct = Math.min(100, Math.max(0, (bf-3)/47*100));
  document.getElementById('bar-marker').style.left = pct+'%';

  const adv = ADVICE[current.key] || ADVICE.avg;
  document.getElementById('r-advice-title').textContent = adv.title;
  document.getElementById('r-advice-body').textContent = adv.body;

  activeGoal = 'fit';
  renderGoals();
  renderRefTable(tableGender);

  const res = document.getElementById('result');
  res.style.display = 'block';
  res.style.animation = 'none';
  void res.offsetWidth;
  res.style.animation = '';
  setTimeout(() => res.scrollIntoView({ behavior:'smooth', block:'start' }), 80);
}

function renderGoals() {
  const goals = GOALS[gender];
  const tabs = document.getElementById('goal-tabs');
  tabs.innerHTML = '';
  goals.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'goal-tab' + (g.key===activeGoal ? ' active' : '');
    btn.textContent = g.label;
    btn.onclick = () => { activeGoal = g.key; renderGoals(); };
    tabs.appendChild(btn);
  });
  const active = goals.find(g => g.key===activeGoal) || goals[1];
  document.getElementById('g-range').textContent = active.range;
  document.getElementById('g-desc').textContent = active.desc;
}

function renderRefTable(g) {
  const data = BF_DATA[g];
  const bf = getCurrentBf();
  let html = `<div class="ref-table-header">
    <span class="ref-col-label">分類</span>
    <span class="ref-col-label">體脂率範圍</span>
    <span class="ref-col-label">說明</span>
  </div>`;
  data.forEach(d => {
    const isActive = bf >= d.min && bf <= d.max;
    html += `<div class="ref-row${isActive?' highlight':''}">
      <span class="ref-category" style="color:${d.color}">${d.label}</span>
      <span class="ref-range">${d.range}</span>
      <span class="ref-note">${d.note}</span>
    </div>`;
  });
  document.getElementById('ref-table').innerHTML = html;
}
</script>
</body>
</html>
