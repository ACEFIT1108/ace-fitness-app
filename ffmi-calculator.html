<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFMI 計算器｜ACE 教練</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131f;
    --border: #1e1e32;
    --accent: #00ff88;
    --accent2: #00c8ff;
    --warn: #ff6b35;
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .header {
    text-align: center;
    padding: 30px 0 24px;
    animation: fadeDown 0.6s ease;
  }

  .header .brand {
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 3px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s ease both;
  }

  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }

  .card-title {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .gender-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .gender-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    color: var(--muted);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .gender-btn.active {
    background: rgba(0,255,136,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  .input-group { margin-bottom: 16px; }

  .input-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .input-label span { color: var(--accent); font-weight: 700; }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 12px rgba(0,255,136,0.5);
  }

  input[type="number"] {
    width: 72px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    padding: 8px 10px;
    text-align: center;
    outline: none;
  }

  input[type="number"]:focus { border-color: var(--accent); }

  .calc-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: #0a0a0f;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .calc-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,255,136,0.3);
  }

  .calc-btn:active { transform: translateY(0); }

  .result-card { display: none; animation: fadeUp 0.5s ease; }
  .result-card.show { display: block; }

  .ffmi-display {
    text-align: center;
    padding: 20px 0;
  }

  .ffmi-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    line-height: 1;
    letter-spacing: 2px;
  }

  .ffmi-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .rating-bar { margin: 20px 0; position: relative; }

  .bar-track {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 0%;
  }

  .bar-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 10px;
    color: var(--muted);
  }

  .rating-badge { text-align: center; margin: 16px 0; }

  .badge {
    display: inline-block;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 16px 0;
  }

  .stat-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 1px;
  }

  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* 180cm+ 修正值 */
  .correction-box {
    display: none;
    background: linear-gradient(135deg, rgba(0,200,255,0.08), rgba(0,255,136,0.05));
    border: 1px solid rgba(0,200,255,0.3);
    border-radius: 12px;
    padding: 14px 16px;
    margin: 12px 0;
    text-align: center;
  }

  .correction-box.show { display: block; animation: fadeUp 0.4s ease; }

  .correction-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .correction-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: var(--accent2);
    letter-spacing: 2px;
    line-height: 1;
  }

  .correction-note {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  .result-desc {
    background: var(--bg);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--muted);
    margin: 16px 0;
  }

  .result-desc strong { color: var(--text); }

  .table-section { margin-top: 8px; }

  .table-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 4px;
    font-size: 13px;
  }

  .table-row .range { color: var(--muted); font-size: 12px; }
  .table-row .level { font-weight: 700; }

  .cta-box {
    background: linear-gradient(135deg, rgba(0,255,136,0.08), rgba(0,200,255,0.08));
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    margin-top: 8px;
  }

  .cta-box p { font-size: 13px; color: var(--muted); margin-bottom: 8px; line-height: 1.6; }
  .cta-box strong { color: var(--text); }

  .cta-tag {
    display: inline-block;
    background: rgba(0,255,136,0.15);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="brand">ACE 教練｜實用工具</div>
    <h1>FFMI</h1>
    <p>Fat Free Mass Index｜無脂肪質量指數</p>
  </div>

  <div class="card">
    <div class="card-title">基本資料</div>
    <div class="gender-toggle">
      <button class="gender-btn active" id="btn-male" onclick="setGender('male')">♂ 男性</button>
      <button class="gender-btn" id="btn-female" onclick="setGender('female')">♀ 女性</button>
    </div>
    <div class="input-group">
      <div class="input-label">身高 <span id="val-height">170</span> cm</div>
      <div class="input-row">
        <input type="range" id="slider-height" min="150" max="200" value="170" oninput="syncInput('height')">
        <input type="number" id="num-height" value="170" min="150" max="200" oninput="syncSlider('height')">
      </div>
    </div>
    <div class="input-group">
      <div class="input-label">體重 <span id="val-weight">70</span> kg</div>
      <div class="input-row">
        <input type="range" id="slider-weight" min="40" max="150" value="70" oninput="syncInput('weight')">
        <input type="number" id="num-weight" value="70" min="40" max="150" oninput="syncSlider('weight')">
      </div>
    </div>
    <div class="input-group">
      <div class="input-label">體脂率 <span id="val-bf">15</span> %</div>
      <div class="input-row">
        <input type="range" id="slider-bf" min="5" max="45" value="15" oninput="syncInput('bf')">
        <input type="number" id="num-bf" value="15" min="5" max="45" oninput="syncSlider('bf')">
      </div>
    </div>
    <button class="calc-btn" onclick="calculate()">計算 FFMI</button>
  </div>

  <div class="card result-card" id="result-card">
    <div class="card-title">計算結果</div>
    <div class="ffmi-display">
      <div class="ffmi-number" id="ffmi-value" style="color: var(--accent)">--</div>
      <div class="ffmi-label">FFMI 數值</div>
    </div>

    <!-- 180cm+ 修正值區塊 -->
    <div class="correction-box" id="correction-box">
      <div class="correction-label">身高超過 180 公分的修正 FFMI</div>
      <div class="correction-value" id="correction-value">--</div>
      <div class="correction-note">公式：FFMI + (身高 − 180) × 0.006</div>
    </div>

    <div class="rating-bar">
      <div class="bar-track">
        <div class="bar-fill" id="bar-fill"></div>
      </div>
      <div class="bar-labels">
        <span>偏低</span><span>普通</span><span>良好</span><span>優秀</span><span>頂尖</span>
      </div>
    </div>
    <div class="rating-badge">
      <span class="badge" id="rating-badge">--</span>
    </div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value" id="stat-lbm" style="color: var(--accent2)">--</div>
        <div class="stat-label">去脂體重 (kg)</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-fat" style="color: var(--warn)">--</div>
        <div class="stat-label">脂肪重量 (kg)</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-ffmi-norm" style="color: var(--accent)">--</div>
        <div class="stat-label">標準化 FFMI</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-bmi">--</div>
        <div class="stat-label">BMI</div>
      </div>
    </div>
    <div class="result-desc" id="result-desc"></div>
    <div class="cta-box">
      <p>想知道你目前的體態在哪個階段？<br><strong>ACE 教練幫你分析最適合的訓練方向</strong></p>
      <a href="https://lin.ee/XOFyyQv" target="_blank" class="cta-tag" style="text-decoration:none;">Line@ 回覆「我想諮詢」</a>
    </div>
  </div>

  <div class="card" style="animation-delay:0.3s">
    <div class="card-title">FFMI 參考對照表</div>
    <div class="table-section" id="ref-table"></div>
  </div>
</div>

<script>
let gender = 'male';

const maleTable = [
  { min: 0,  max: 17.9, level: '偏低', color: '#6b7280', bg: 'rgba(107,114,128,0.08)' },
  { min: 18, max: 19.9, level: '普通', color: '#60a5fa', bg: 'rgba(96,165,250,0.08)' },
  { min: 20, max: 21.9, level: '良好', color: '#34d399', bg: 'rgba(52,211,153,0.08)' },
  { min: 22, max: 23.9, level: '優秀', color: '#00ff88', bg: 'rgba(0,255,136,0.08)' },
  { min: 24, max: 25.9, level: '菁英', color: '#00c8ff', bg: 'rgba(0,200,255,0.08)' },
  { min: 26, max: 99,   level: '頂尖運動員', color: '#ff6b35', bg: 'rgba(255,107,53,0.08)' },
];

const femaleTable = [
  { min: 0,  max: 14.9, level: '偏低', color: '#6b7280', bg: 'rgba(107,114,128,0.08)' },
  { min: 15, max: 16.9, level: '普通', color: '#60a5fa', bg: 'rgba(96,165,250,0.08)' },
  { min: 17, max: 18.9, level: '良好', color: '#34d399', bg: 'rgba(52,211,153,0.08)' },
  { min: 19, max: 20.9, level: '優秀', color: '#00ff88', bg: 'rgba(0,255,136,0.08)' },
  { min: 21, max: 22.9, level: '菁英', color: '#00c8ff', bg: 'rgba(0,200,255,0.08)' },
  { min: 23, max: 99,   level: '頂尖運動員', color: '#ff6b35', bg: 'rgba(255,107,53,0.08)' },
];

const descriptions = {
  '偏低': '<strong>肌肉量偏低</strong>，建議優先以增肌為目標。搭配重量訓練並確保足夠的蛋白質攝取，是提升 FFMI 最有效的方式。',
  '普通': '<strong>肌肉量達到一般水準</strong>，有明顯的進步空間。持續訓練並優化飲食策略，可以在幾個月內看到明顯進步。',
  '良好': '<strong>肌肉量不錯</strong>，代表你有一定的訓練基礎。繼續保持，搭配週期化訓練可以突破瓶頸。',
  '優秀': '<strong>肌肉量優秀</strong>，超越大多數健身者。這個階段需要更精細的訓練與飲食規劃才能繼續進步。',
  '菁英': '<strong>菁英級肌肉量</strong>，屬於認真健身多年的成果。維持這個水準本身就需要高度的自律與專業規劃。',
  '頂尖運動員': '<strong>頂尖運動員水準</strong>，這個數值在自然訓練中非常罕見，代表極高天賦加上多年專業訓練的成果。',
};

function setGender(g) {
  gender = g;
  document.getElementById('btn-male').classList.toggle('active', g === 'male');
  document.getElementById('btn-female').classList.toggle('active', g === 'female');
  renderTable();
}

function syncInput(field) {
  const val = document.getElementById('slider-' + field).value;
  document.getElementById('num-' + field).value = val;
  document.getElementById('val-' + field).textContent = val;
}

function syncSlider(field) {
  const val = document.getElementById('num-' + field).value;
  document.getElementById('slider-' + field).value = val;
  document.getElementById('val-' + field).textContent = val;
}

function getTable() { return gender === 'male' ? maleTable : femaleTable; }

function getRating(ffmi) {
  const table = getTable();
  // 用四捨五入到小數點後一位來比對，避免浮點精度問題
  const rounded = Math.round(ffmi * 10) / 10;
  return table.find(r => rounded >= r.min && rounded <= r.max) || table[table.length - 1];
}

function calculate() {
  const heightCm = parseFloat(document.getElementById('num-height').value);
  const h = heightCm / 100;
  const w = parseFloat(document.getElementById('num-weight').value);
  const bf = parseFloat(document.getElementById('num-bf').value) / 100;
  if (!h || !w || !bf) return;

  const lbm = w * (1 - bf);
  const fat = w * bf;
  const ffmi = lbm / (h * h);
  const ffmiNorm = ffmi + 6.1 * (1.8 - h);
  const bmi = w / (h * h);

  document.getElementById('ffmi-value').textContent = ffmi.toFixed(2);
  document.getElementById('stat-lbm').textContent = lbm.toFixed(1);
  document.getElementById('stat-fat').textContent = fat.toFixed(1);
  document.getElementById('stat-ffmi-norm').textContent = ffmiNorm.toFixed(2);
  document.getElementById('stat-bmi').textContent = bmi.toFixed(1);

  // 180cm+ 修正值
  const correctionBox = document.getElementById('correction-box');
  if (heightCm > 180) {
    const corrected = ffmi + (heightCm - 180) * 0.006;
    document.getElementById('correction-value').textContent = corrected.toFixed(2);
    correctionBox.classList.add('show');
  } else {
    correctionBox.classList.remove('show');
  }

  const rating = getRating(ffmi);
  const badge = document.getElementById('rating-badge');
  badge.textContent = rating.level;
  badge.style.background = rating.bg;
  badge.style.color = rating.color;
  badge.style.border = `1px solid ${rating.color}`;
  document.getElementById('ffmi-value').style.color = rating.color;

  const maxVal = gender === 'male' ? 28 : 25;
  const minVal = gender === 'male' ? 15 : 12;
  const pct = Math.min(100, Math.max(0, ((ffmi - minVal) / (maxVal - minVal)) * 100));
  const fill = document.getElementById('bar-fill');
  fill.style.background = `linear-gradient(90deg, #6b7280, ${rating.color})`;
  setTimeout(() => { fill.style.width = pct + '%'; }, 50);

  document.getElementById('result-desc').innerHTML = descriptions[rating.level] || '';

  const resultCard = document.getElementById('result-card');
  resultCard.classList.add('show');
  setTimeout(() => resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  renderTable(ffmi);
}

function renderTable(currentFFMI) {
  const table = getTable();
  const container = document.getElementById('ref-table');
  container.innerHTML = '';
  table.forEach(row => {
    const div = document.createElement('div');
    div.className = 'table-row';
    const roundedFFMI = currentFFMI !== undefined ? Math.round(currentFFMI * 10) / 10 : undefined;
    const isHighlight = roundedFFMI !== undefined && roundedFFMI >= row.min && roundedFFMI <= row.max;
    div.style.background = isHighlight ? row.bg : 'transparent';
    if (isHighlight) div.style.border = `1px solid ${row.color}`;
    const rangeText = row.max === 99 ? `${row.min}+` : `${row.min} – ${row.max}`;
    div.innerHTML = `
      <span class="range">${rangeText}</span>
      <span class="level" style="color:${row.color}">${row.level} ${isHighlight ? '← 你在這' : ''}</span>
    `;
    container.appendChild(div);
  });
}

renderTable();
</script>
</body>
</html>
