<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACE 智能課表生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d; --surface: #141414; --surface2: #1a1a1a;
    --border: #2a2a2a; --accent: #c8f135; --text: #f0f0f0; --muted: #666;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; overflow-x: hidden; }

  .header { padding: 28px 24px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  .logo-badge { width: 44px; height: 44px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #000; flex-shrink: 0; }
  .header-text h1 { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--accent); line-height: 1; }
  .header-text p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .container { max-width: 860px; margin: 0 auto; padding: 28px 20px 60px; }
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 28px; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 16px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .field select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-size: 14px; padding: 10px 14px; outline: none; transition: border-color 0.2s; width: 100%; appearance: none; }
  .field select:focus { border-color: var(--accent); }
  .field select option { background: #1a1a1a; }
  .select-wrap { position: relative; }
  .select-wrap::after { content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 12px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 13px; cursor: pointer; transition: all 0.2s; user-select: none; }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
  .divider { height: 1px; background: var(--border); margin: 22px 0; }

  .btn-generate { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 12px; color: #000; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .btn-generate:hover { background: #d4ff40; transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }

  .output-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; display: none; }
  .output-card.visible { display: block; }
  .output-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .output-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; color: var(--accent); }
  .btn-copy { padding: 7px 16px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans TC', sans-serif; }
  .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
  .output-body { padding: 24px; font-size: 14px; line-height: 1.8; }

  .loader { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 14px; padding: 40px 0; justify-content: center; }
  .dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform:scale(0.6);opacity:0.4; } 40% { transform:scale(1);opacity:1; } }

  .workout-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  .workout-table th { background: #1e1e1e; padding: 10px 14px; text-align: left; font-size: 11px; letter-spacing: 1.5px; color: var(--accent); font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .workout-table td { padding: 10px 14px; border-bottom: 1px solid #1e1e1e; font-size: 13px; vertical-align: top; }
  .workout-table tr:last-child td { border-bottom: none; }
  .workout-table tr:hover td { background: #171717; }
  .workout-table tr.key-move td { color: #FF6B35; font-weight: 700; background: rgba(255,107,53,0.04); }
  .workout-table tr.key-move td:first-child::before { content: '★ '; }

  .day-header { background: #181818; padding: 12px 16px; margin: 20px 0 10px; border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0; font-weight: 700; font-size: 14px; color: var(--text); }
  .day-header:first-child { margin-top: 0; }
  .focus-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; background: rgba(255,107,53,0.15); color: #FF6B35; border: 1px solid rgba(255,107,53,0.35); margin-left: 10px; vertical-align: middle; }

  .note-box { background: #141e08; border: 1px solid #2a3d10; border-radius: 10px; padding: 16px 18px; margin-top: 20px; font-size: 13px; color: #a3d448; line-height: 1.7; }
  .note-box strong { color: var(--accent); }

  .cta-block { background: linear-gradient(135deg,#141e08 0%,#0f1a06 100%); border: 1px solid #2a3d10; border-radius: 14px; padding: 24px 28px; margin: 0 24px 24px; display: none; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
  .cta-text h3 { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .cta-text p { font-size: 12px; color: #7a9a50; line-height: 1.6; }
  .btn-line { display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: #000; font-family: 'Noto Sans TC',sans-serif; font-weight: 700; font-size: 13px; padding: 11px 22px; border-radius: 10px; text-decoration: none; white-space: nowrap; transition: all 0.2s; flex-shrink: 0; }
  .btn-line:hover { background: #d4ff40; transform: translateY(-1px); }

  .brand-footer { text-align: center; padding-top: 20px; padding-bottom: 8px; }
  .brand-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px; color: #333; }
  .brand-tagline { font-size: 11px; color: #2a2a2a; margin-top: 3px; }

  @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } .form-card { padding: 20px; } }
</style>

            <option value="intermediate">中階（6 個月–2 年）</option>
            <option value="advanced">進階（2 年以上）</option>

      </div>
    </div>
    <div class="field">

    </div>
  </div>

  <div class="brand-footer">
    <div class="brand-name">ACEFIT1108</div>
    <div class="brand-tagline">你的 AI 智能訓練・健康管理教練</div>
  </div>
</div>

document.querySelectorAll('#days-chips .chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('#days-chips .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
  });
});
function getDay() {
  const a = document.querySelector('#days-chips .chip.active');
  return a ? a.dataset.val : '4';
}

  fat_loss_advanced_3:   'fat_loss_intermediate_4',
  fat_loss_advanced_4:   'fat_loss_intermediate_4',

  home_advanced_5:       'home_intermediate_4',
};

let rawPlanText = '';

function generateWorkout() {
  const goal  = document.getElementById('goal').value;
  const level = document.getElementById('level').value;
  const days  = getDay();
  const key   = `${goal}_${level}_${days}`;
  const plan  = PLANS[key] || PLANS[FALLBACK[key]];

  const card = document.getElementById('outputCard');
  const body = document.getElementById('outputBody');
  card.classList.add('visible');
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });

  body.innerHTML = `<div class="loader"><div class="dots"><span></span><span></span><span></span></div>規劃你的課表中…</div>`;
  document.getElementById('ctaBlock').style.display = 'none';

  setTimeout(() => {
    if (!plan) {
      body.innerHTML = `<div style="color:#FF6B35;padding:20px;text-align:center">⚠️ 查無對應課表，請嘗試其他組合</div>`;
      return;
    }
    document.getElementById('outputTitle').textContent = plan.title;
    let html = '';
    let txt  = plan.title + '\n\n';

    plan.days.forEach(day => {
      html += `<div class="day-header">📅 ${day.title}<span class="focus-badge">🎯 主軸：${day.focus}</span></div>`;
      html += `<table class="workout-table"><thead><tr><th>動作</th><th>組數 × 次數</th><th>執行重點</th></tr></thead><tbody>`;
      txt  += `【${day.title}｜主軸：${day.focus}】\n`;
      day.moves.forEach(m => {
        const cls = m.key ? ' class="key-move"' : '';
        html += `<tr${cls}><td>${m.name}</td><td>${m.sets}</td><td>${m.tip}</td></tr>`;
        txt  += `${m.key ? '★ ' : ''}${m.name}　${m.sets}　${m.tip}\n`;
      });
      html += `</tbody></table>`;
      txt  += '\n';
    });

    html += `<div class="note-box"><strong>📌 教練提醒</strong><br>${plan.note}</div>`;
    txt  += `📌 教練提醒\n${plan.note}`;

    rawPlanText = txt;
    body.innerHTML = html;
    document.getElementById('ctaBlock').style.display = 'flex';
  }, 800);
}

function copyPlan() {
  if (!rawPlanText) return;
  navigator.clipboard.writeText(rawPlanText).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '✅ 已複製';
    setTimeout(() => btn.textContent = '📋 複製課表', 2000);
  });
}
